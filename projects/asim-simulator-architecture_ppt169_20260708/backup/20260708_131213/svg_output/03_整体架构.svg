<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#0D1B2A"/>

  <!-- Faint grid -->
  <g fill="none" stroke="#1B2838" stroke-width="0.5" stroke-opacity="0.25">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="640" x2="1280" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>

  <!-- Title -->
  <text x="60" y="70" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="48" font-weight="bold" fill="#ECEFF1">仿真器整体架构</text>
  <rect x="60" y="86" width="80" height="2" fill="#00BCD4" fill-opacity="0.7"/>

  <!-- Core message -->
  <text x="60" y="125" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" fill="#90A4AE">Simulator 作为中心调度者，统一管理 7 大子系统，通过三域时间推进实现周期精确仿真</text>

  <!-- Architecture Diagram: Center-Radiating Layout -->
  <g fill="none">
    <!-- Central Simulator Node -->
    <g>
      <rect x="510" y="310" width="260" height="80" rx="6" fill="#1B2838" fill-opacity="0.9" stroke="#2196F3" stroke-width="2" stroke-opacity="0.8"/>
      <text x="640" y="345" font-family="Consolas, monospace" font-size="24" font-weight="bold" fill="#ECEFF1" text-anchor="middle">Simulator</text>
      <text x="640" y="372" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#90A4AE" text-anchor="middle">全局事件循环 · 三域时间推进</text>
    </g>

    <!-- Top: Scheduler -->
    <g>
      <rect x="540" y="170" width="200" height="55" rx="4" fill="#1B2838" fill-opacity="0.8" stroke="#2196F3" stroke-width="1.2" stroke-opacity="0.6"/>
      <text x="640" y="195" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#ECEFF1" text-anchor="middle">Scheduler</text>
      <text x="640" y="214" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">Tile 分发 → 多核</text>
      <!-- Line: Simulator → Scheduler -->
      <line x1="640" y1="310" x2="640" y2="225" stroke="#2196F3" stroke-width="1" stroke-opacity="0.5"/>
      <polygon points="636,233 640,225 644,233" fill="#2196F3" fill-opacity="0.5" stroke="none"/>
    </g>

    <!-- Left: Cores (3 columns of core blocks) -->
    <g>
      <!-- Core cluster box -->
      <rect x="60" y="240" width="360" height="260" rx="5" fill="none" stroke="#00BCD4" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="6,4"/>
      <text x="240" y="232" font-family="Consolas, monospace" font-size="14" fill="#00BCD4" fill-opacity="0.6" text-anchor="middle">CORES</text>
      <!-- Individual core representations -->
      <rect x="80" y="260" width="100" height="45" rx="3" fill="#1B2838" fill-opacity="0.7" stroke="#263238" stroke-width="0.8"/>
      <text x="130" y="280" font-family="Consolas, monospace" font-size="14" fill="#ECEFF1" text-anchor="middle">Core[0]</text>
      <text x="130" y="296" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#607D8B" text-anchor="middle">SystolicWS</text>

      <rect x="190" y="260" width="100" height="45" rx="3" fill="#1B2838" fill-opacity="0.7" stroke="#263238" stroke-width="0.8"/>
      <text x="240" y="280" font-family="Consolas, monospace" font-size="14" fill="#ECEFF1" text-anchor="middle">Core[1]</text>
      <text x="240" y="296" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#607D8B" text-anchor="middle">SystolicWS</text>

      <rect x="300" y="260" width="100" height="45" rx="3" fill="#1B2838" fill-opacity="0.7" stroke="#263238" stroke-width="0.8"/>
      <text x="350" y="280" font-family="Consolas, monospace" font-size="14" fill="#ECEFF1" text-anchor="middle">Core[23]</text>
      <text x="350" y="296" font-family="'Microsoft YaHei', sans-serif" font-size="10" fill="#607D8B" text-anchor="middle">SystolicWS</text>

      <text x="240" y="330" font-family="Consolas, monospace" font-size="12" fill="#607D8B" text-anchor="middle">...</text>

      <!-- Pipeline description inside core box -->
      <text x="240" y="370" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#4DD0E1" text-anchor="middle">Cube Pipeline</text>
      <text x="240" y="392" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#4DD0E1" text-anchor="middle">Vector Pipeline</text>
      <text x="240" y="414" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#4DD0E1" text-anchor="middle">Scalar Pipeline</text>
      <text x="240" y="445" font-family="Consolas, monospace" font-size="11" fill="#607D8B" text-anchor="middle">SPAD 256KB + ACCUM 256KB</text>

      <!-- Scheduler → Cores -->
      <line x1="540" y1="200" x2="420" y2="340" stroke="#2196F3" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4,3"/>
    </g>

    <!-- Right: DRAM -->
    <g>
      <rect x="1040" y="240" width="180" height="120" rx="4" fill="#1B2838" fill-opacity="0.8" stroke="#4DD0E1" stroke-width="1.2" stroke-opacity="0.6"/>
      <text x="1130" y="275" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#ECEFF1" text-anchor="middle">DRAM</text>
      <text x="1130" y="298" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">Ramulator2 HBM2</text>
      <text x="1130" y="318" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">32 通道</text>
      <text x="1130" y="338" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">周期精确模型</text>

      <!-- Simulator → DRAM -->
      <line x1="770" y1="350" x2="1040" y2="300" stroke="#4DD0E1" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4,3"/>
    </g>

    <!-- Right-Bottom: Interconnect -->
    <g>
      <rect x="1020" y="420" width="200" height="100" rx="4" fill="#1B2838" fill-opacity="0.8" stroke="#00BCD4" stroke-width="1.2" stroke-opacity="0.6"/>
      <text x="1120" y="455" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#ECEFF1" text-anchor="middle">Interconnect</text>
      <text x="1120" y="478" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">NoC：Simple / BookSim2</text>
      <text x="1120" y="498" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">Core ↔ DRAM 路由</text>

      <!-- Cores ↔ ICNT (bidirectional) -->
      <line x1="420" y1="420" x2="1020" y2="470" stroke="#00BCD4" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,3"/>
      <polygon points="1012,466 1020,470 1012,474" fill="#00BCD4" fill-opacity="0.3" stroke="none"/>
      <!-- Simulator → ICNT -->
      <line x1="770" y1="380" x2="1020" y2="440" stroke="#00BCD4" stroke-width="0.8" stroke-opacity="0.3"/>
    </g>

    <!-- Bottom-Left: Model / Operation -->
    <g>
      <rect x="60" y="540" width="420" height="90" rx="4" fill="#1B2838" fill-opacity="0.8" stroke="#4DD0E1" stroke-width="1" stroke-opacity="0.5"/>
      <text x="270" y="572" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#ECEFF1" text-anchor="middle">Model → Operation → Tile → Instruction</text>
      <text x="270" y="598" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">张量计算图 → 算子实现 → 工作单元 → 原子执行单元</text>
      <text x="270" y="618" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">三层执行模型：仿真器的核心设计范式</text>

      <!-- Scheduler → Model/Op -->
      <line x1="540" y1="190" x2="270" y2="540" stroke="#4DD0E1" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,3"/>
    </g>

    <!-- Bottom-Center: FormulaLogger + TraceLogger -->
    <g>
      <rect x="520" y="540" width="220" height="90" rx="4" fill="#1B2838" fill-opacity="0.8" stroke="#2196F3" stroke-width="1" stroke-opacity="0.5"/>
      <text x="630" y="572" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#ECEFF1" text-anchor="middle">FormulaLogger</text>
      <text x="630" y="595" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">数学语义 → formula_steps.json</text>
      <text x="630" y="615" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">TraceLogger → trace.csv</text>

      <!-- Simulator → Logger -->
      <line x1="640" y1="390" x2="630" y2="540" stroke="#2196F3" stroke-width="0.8" stroke-opacity="0.4"/>
      <polygon points="634,532 630,540 626,532" fill="#2196F3" fill-opacity="0.4" stroke="none"/>
    </g>

    <!-- Connected lines Cores → ICNT (bidirectional data path) -->
    <g stroke="#00BCD4" stroke-opacity="0.4" stroke-width="0.8">
      <line x1="420" y1="300" x2="1020" y2="440" stroke-dasharray="3,3"/>
      <line x1="420" y1="420" x2="1020" y2="440"/>
    </g>
  </g>

  <!-- Footer -->
  <text x="1220" y="695" font-family="Consolas, monospace" font-size="14" fill="#607D8B" fill-opacity="0.5" text-anchor="end">P03</text>
</svg>