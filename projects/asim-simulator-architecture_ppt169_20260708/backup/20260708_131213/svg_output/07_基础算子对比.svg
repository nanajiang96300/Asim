<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#0D1B2A"/>

  <!-- Grid -->
  <g fill="none" stroke="#1B2838" stroke-width="0.5" stroke-opacity="0.2">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="640" x2="1280" y2="640"/>
  </g>

  <!-- Title -->
  <text x="60" y="60" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="48" font-weight="bold" fill="#ECEFF1">基础算子：GEMM · Vector · Scalar</text>
  <rect x="60" y="76" width="80" height="2" fill="#00BCD4" fill-opacity="0.7"/>

  <text x="60" y="108" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" fill="#90A4AE">三类基础计算算子分别映射到 Cube / Vector / Scalar 三条物理流水线</text>

  <!-- ===== TABLE ===== -->
  <g>
    <!-- Table Header -->
    <rect x="40" y="135" width="1200" height="44" rx="3" fill="#1B2838" fill-opacity="0.8" stroke="#263238" stroke-width="1"/>
    <text x="100" y="164" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#ECEFF1">特性</text>
    <text x="320" y="164" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#2196F3">GEMM (Cube)</text>
    <text x="680" y="164" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#00BCD4">Vector</text>
    <text x="1000" y="164" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#4DD0E1">Scalar</text>

    <!-- Vertical column separators -->
    <line x1="280" y1="135" x2="280" y2="615" stroke="#263238" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="600" y1="135" x2="600" y2="615" stroke="#263238" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="920" y1="135" x2="920" y2="615" stroke="#263238" stroke-width="0.8" stroke-opacity="0.3"/>

    <!-- Row 1: 指令 -->
    <rect x="40" y="179" width="1200" height="52" rx="0" fill="#1B2838" fill-opacity="0.35" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="205" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">指令</text>
    <text x="320" y="205" font-family="Consolas, monospace" font-size="16" fill="#2196F3">GEMM_PRELOAD, GEMM</text>
    <text x="680" y="197" font-family="Consolas, monospace" font-size="14" fill="#00BCD4">ADD, MUL, MAC, DIV, SQRT, EXP,</text>
    <text x="680" y="216" font-family="Consolas, monospace" font-size="14" fill="#00BCD4">GELU, ADDTREE, COMP, PIPE_BARRIER</text>
    <text x="1000" y="197" font-family="Consolas, monospace" font-size="14" fill="#4DD0E1">SCALAR_ADD, SCALAR_SUB, SCALAR_MUL,</text>
    <text x="1000" y="216" font-family="Consolas, monospace" font-size="14" fill="#4DD0E1">SCALAR_DIV, SCALAR_SQRT</text>

    <!-- Row 2: 硬件单元 -->
    <rect x="40" y="231" width="1200" height="52" rx="0" fill="#0D1B2A" fill-opacity="0.5" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="257" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">硬件单元</text>
    <text x="320" y="257" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">脉动阵列 (Systolic Array)</text>
    <text x="680" y="257" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">Vector SIMD (2048-bit)</text>
    <text x="1000" y="257" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">Scalar ALU</text>

    <!-- Row 3: 并行度 -->
    <rect x="40" y="283" width="1200" height="52" rx="0" fill="#1B2838" fill-opacity="0.35" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="309" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">并行度</text>
    <text x="320" y="309" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#4CAF50">多发射（深度 = core_height）</text>
    <text x="680" y="309" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#FF9800">单发射（前条未完成则阻塞）</text>
    <text x="1000" y="309" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#FF9800">严格单发射（pipeline 仅 1 条）</text>

    <!-- Row 4: 延迟模型 -->
    <rect x="40" y="335" width="1200" height="52" rx="0" fill="#0D1B2A" fill-opacity="0.5" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="361" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">延迟模型</text>
    <text x="320" y="361" font-family="Consolas, monospace" font-size="14" fill="#90A4AE">1+(M+N-2)+max(blocks, 1)</text>
    <text x="680" y="361" font-family="Consolas, monospace" font-size="15" fill="#90A4AE">vec_op_iter × latency</text>
    <text x="1000" y="361" font-family="Consolas, monospace" font-size="15" fill="#90A4AE">固定 1-4 cycles</text>

    <!-- Row 5: compute_size -->
    <rect x="40" y="387" width="1200" height="52" rx="0" fill="#1B2838" fill-opacity="0.35" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="413" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">compute_size</text>
    <text x="320" y="413" font-family="Consolas, monospace" font-size="18" fill="#2196F3">tile_m × tile_k × tile_n</text>
    <text x="680" y="413" font-family="Consolas, monospace" font-size="18" fill="#00BCD4">U × U 或向量宽度</text>
    <text x="1000" y="413" font-family="Consolas, monospace" font-size="18" fill="#4DD0E1">1</text>

    <!-- Row 6: 基本块 -->
    <rect x="40" y="439" width="1200" height="52" rx="0" fill="#0D1B2A" fill-opacity="0.5" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="465" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">基本块</text>
    <text x="320" y="465" font-family="Consolas, monospace" font-size="18" fill="#2196F3">16 × 16 × 16</text>
    <text x="680" y="465" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">128 FP16 / 拍</text>
    <text x="1000" y="465" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">1 元素 / 拍</text>

    <!-- Row 7: 典型用途 -->
    <rect x="40" y="491" width="1200" height="52" rx="0" fill="#1B2838" fill-opacity="0.35" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="517" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">典型用途</text>
    <text x="320" y="517" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">矩阵乘法、Gram 矩阵</text>
    <text x="680" y="517" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">逐元素运算、激活函数、同步屏障</text>
    <text x="1000" y="517" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">对角线元素操作（Cholesky/LDL）</text>

    <!-- Row 8: 使用基数 -->
    <rect x="40" y="543" width="1200" height="52" rx="3" fill="#0D1B2A" fill-opacity="0.5" stroke="#263238" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="100" y="569" font-family="'Microsoft YaHei', sans-serif" font-size="19" font-weight="bold" fill="#ECEFF1">SPAD 地址</text>
    <text x="320" y="569" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">ACCUM_SPAD (0x20000000)</text>
    <text x="680" y="569" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">SPAD (0x10000000)</text>
    <text x="1000" y="569" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1">SPAD (0x10000000)</text>
  </g>

  <!-- Bottom note -->
  <g>
    <rect x="40" y="615" width="1200" height="36" rx="2" fill="#1B2838" fill-opacity="0.4" stroke="none"/>
    <text x="640" y="639" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#607D8B" text-anchor="middle">数据搬运流程：MOVIN: DRAM → SPAD   |   计算：SPAD → Pipeline → SPAD/ACCUM   |   MOVOUT: SPAD → DRAM</text>
  </g>

  <text x="1220" y="695" font-family="Consolas, monospace" font-size="14" fill="#607D8B" fill-opacity="0.5" text-anchor="end">P07</text>
</svg>