<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#0D1B2A"/>

  <!-- Grid -->
  <g fill="none" stroke="#1B2838" stroke-width="0.5" stroke-opacity="0.25">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
  </g>

  <!-- Title -->
  <text x="60" y="65" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="48" font-weight="bold" fill="#ECEFF1">仿真主循环：三域时间推进</text>
  <rect x="60" y="81" width="80" height="2" fill="#00BCD4" fill-opacity="0.7"/>

  <text x="60" y="110" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" fill="#90A4AE">set_cycle_mask() 比较 Core / DRAM / ICNT 三域时间戳，实现异构频率精确交错</text>

  <!-- Main Loop Flow: Left side - vertical stages -->
  <g>
    <!-- Stage 0: while(running) -->
    <rect x="120" y="150" width="320" height="56" rx="4" fill="#1B2838" fill-opacity="0.8" stroke="#2196F3" stroke-width="1.5" stroke-opacity="0.7"/>
    <text x="280" y="174" font-family="Consolas, monospace" font-size="20" font-weight="bold" fill="#ECEFF1" text-anchor="middle">while (running())</text>
    <text x="280" y="196" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">所有组件都空闲时退出</text>

    <!-- Arrow -->
    <line x1="280" y1="206" x2="280" y2="230" stroke="#2196F3" stroke-width="1.2" stroke-opacity="0.5"/>
    <polygon points="276,224 280,230 284,224" fill="#2196F3" fill-opacity="0.5" stroke="none"/>

    <!-- Stage 1: set_cycle_mask -->
    <rect x="120" y="235" width="320" height="56" rx="4" fill="#1B2838" fill-opacity="0.8" stroke="#00BCD4" stroke-width="1.5" stroke-opacity="0.7"/>
    <text x="280" y="259" font-family="Consolas, monospace" font-size="20" font-weight="bold" fill="#ECEFF1" text-anchor="middle">set_cycle_mask()</text>
    <text x="280" y="281" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">比较三域时间戳，选择推进域</text>

    <!-- Arrow -->
    <line x1="280" y1="291" x2="280" y2="310" stroke="#00BCD4" stroke-width="1.2" stroke-opacity="0.5"/>
    <polygon points="276,304 280,310 284,304" fill="#00BCD4" fill-opacity="0.5" stroke="none"/>

    <!-- Stage 2: Three domains in parallel columns -->
    <!-- Core Domain -->
    <rect x="60" y="315" width="220" height="180" rx="4" fill="#1B2838" fill-opacity="0.6" stroke="#2196F3" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="60" y="315" width="220" height="34" rx="4" fill="#2196F3" fill-opacity="0.12"/>
    <text x="170" y="338" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#2196F3" text-anchor="middle">CORE_MASK</text>
    <text x="80" y="372" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">handle_model()</text>
    <text x="80" y="398" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">pop_finished_tile()</text>
    <text x="80" y="424" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">issue(new_tile)</text>
    <text x="80" y="450" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">core->cycle()</text>
    <text x="80" y="476" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#4DD0E1">core_cycles++</text>

    <!-- DRAM Domain -->
    <rect x="300" y="315" width="180" height="180" rx="4" fill="#1B2838" fill-opacity="0.6" stroke="#4DD0E1" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="300" y="315" width="180" height="34" rx="4" fill="#4DD0E1" fill-opacity="0.12"/>
    <text x="390" y="338" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#4DD0E1" text-anchor="middle">DRAM_MASK</text>
    <text x="320" y="380" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">dram->cycle()</text>
    <text x="320" y="410" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE">Ramulator2 HBM2</text>
    <text x="320" y="435" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE">32 通道周期推进</text>
    <text x="320" y="470" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#4DD0E1">dram_time += period</text>

    <!-- ICNT Domain -->
    <rect x="500" y="315" width="300" height="180" rx="4" fill="#1B2838" fill-opacity="0.6" stroke="#00BCD4" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="500" y="315" width="300" height="34" rx="4" fill="#00BCD4" fill-opacity="0.12"/>
    <text x="650" y="338" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#00BCD4" text-anchor="middle">ICNT_MASK</text>
    <text x="520" y="372" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">Core → ICNT: push memory request</text>
    <text x="520" y="398" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">ICNT → Core: pop response</text>
    <text x="520" y="424" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">ICNT → DRAM: forward request</text>
    <text x="520" y="450" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">DRAM → ICNT: return response</text>
    <text x="520" y="476" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#4DD0E1">icnt->cycle()</text>
  </g>

  <!-- Time multiplexing diagram (right side) -->
  <g>
    <text x="860" y="155" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#00BCD4">三域时间推进示意</text>

    <!-- Timing diagram -->
    <text x="860" y="185" font-family="Consolas, monospace" font-size="14" fill="#607D8B">Core: 1GHz (1ns period)</text>
    <text x="860" y="208" font-family="Consolas, monospace" font-size="14" fill="#607D8B">DRAM: 500MHz (2ns period)</text>
    <text x="860" y="231" font-family="Consolas, monospace" font-size="14" fill="#607D8B">ICNT: 500MHz (2ns period)</text>

    <!-- Timing bars -->
    <g fill="none" stroke-width="1.5">
      <!-- Core row -->
      <text x="860" y="275" font-family="Consolas, monospace" font-size="12" fill="#2196F3">Core</text>
      <rect x="920" y="262" width="24" height="14" rx="1" fill="#2196F3" fill-opacity="0.5" stroke="#2196F3" stroke-opacity="0.7"/>
      <rect x="948" y="262" width="24" height="14" rx="1" fill="#2196F3" fill-opacity="0.5" stroke="#2196F3" stroke-opacity="0.7"/>
      <rect x="976" y="262" width="24" height="14" rx="1" fill="#2196F3" fill-opacity="0.5" stroke="#2196F3" stroke-opacity="0.7"/>
      <rect x="1004" y="262" width="24" height="14" rx="1" fill="#2196F3" fill-opacity="0.5" stroke="#2196F3" stroke-opacity="0.7"/>
      <rect x="1032" y="262" width="24" height="14" rx="1" fill="#2196F3" fill-opacity="0.5" stroke="#2196F3" stroke-opacity="0.7"/>
      <rect x="1060" y="262" width="24" height="14" rx="1" fill="#2196F3" fill-opacity="0.5" stroke="#2196F3" stroke-opacity="0.7"/>
      <!-- DRAM row -->
      <text x="860" y="305" font-family="Consolas, monospace" font-size="12" fill="#4DD0E1">DRAM</text>
      <rect x="920" y="292" width="52" height="14" rx="1" fill="#4DD0E1" fill-opacity="0.4" stroke="#4DD0E1" stroke-opacity="0.6"/>
      <rect x="976" y="292" width="52" height="14" rx="1" fill="#4DD0E1" fill-opacity="0.4" stroke="#4DD0E1" stroke-opacity="0.6"/>
      <rect x="1032" y="292" width="52" height="14" rx="1" fill="#4DD0E1" fill-opacity="0.4" stroke="#4DD0E1" stroke-opacity="0.6"/>
      <!-- ICNT row -->
      <text x="860" y="335" font-family="Consolas, monospace" font-size="12" fill="#00BCD4">ICNT</text>
      <rect x="920" y="322" width="52" height="14" rx="1" fill="#00BCD4" fill-opacity="0.4" stroke="#00BCD4" stroke-opacity="0.6"/>
      <rect x="976" y="322" width="52" height="14" rx="1" fill="#00BCD4" fill-opacity="0.4" stroke="#00BCD4" stroke-opacity="0.6"/>
      <rect x="1032" y="322" width="52" height="14" rx="1" fill="#00BCD4" fill-opacity="0.4" stroke="#00BCD4" stroke-opacity="0.6"/>
    </g>
    <text x="860" y="370" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE">每个 step 选择时间戳最小的域推进</text>
    <text x="860" y="392" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE">频率不同自然形成交错执行</text>
  </g>

  <!-- Bottom: output info -->
  <g>
    <line x1="60" y1="520" x2="820" y2="520" stroke="#263238" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="60" y="555" font-family="'Microsoft YaHei', sans-serif" font-size="22" fill="#ECEFF1">仿真结束 → 统计输出</text>
    <text x="320" y="555" font-family="Consolas, monospace" font-size="20" fill="#00BCD4">Core 利用率</text>
    <text x="520" y="555" font-family="Consolas, monospace" font-size="20" fill="#00BCD4">Trace CSV</text>
    <text x="680" y="555" font-family="Consolas, monospace" font-size="20" fill="#00BCD4">Formula JSON</text>
    <text x="320" y="582" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#90A4AE">Cube% / Vector% / Scalar%</text>
    <text x="520" y="582" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#90A4AE">指令级时间线</text>
    <text x="680" y="582" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#90A4AE">数学语义 DAG 验证</text>
  </g>

  <text x="1220" y="695" font-family="Consolas, monospace" font-size="14" fill="#607D8B" fill-opacity="0.5" text-anchor="end">P05</text>
</svg>