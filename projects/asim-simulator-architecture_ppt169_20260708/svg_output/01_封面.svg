<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196F3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="vignetteR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="720" fill="#0D1B2A"/>

  <!-- Grid lines -->
  <g fill="none" stroke="#1B2838" stroke-width="0.5" stroke-opacity="0.4">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- Accent glow in top-right -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#accentGlow)"/>

  <!-- Blueprint Architecture Diagram (abstract NPU layout) -->
  <g fill="none" stroke-width="1.2">
    <!-- Central Core cluster (3x3 grid of cores) -->
    <g stroke="#2196F3" stroke-opacity="0.7">
      <!-- Core grid -->
      <rect x="720" y="180" width="60" height="40" rx="2"/>
      <rect x="790" y="180" width="60" height="40" rx="2"/>
      <rect x="860" y="180" width="60" height="40" rx="2"/>
      <rect x="720" y="235" width="60" height="40" rx="2"/>
      <rect x="790" y="235" width="60" height="40" rx="2"/>
      <rect x="860" y="235" width="60" height="40" rx="2"/>
      <rect x="720" y="290" width="60" height="40" rx="2"/>
      <rect x="790" y="290" width="60" height="40" rx="2"/>
      <rect x="860" y="290" width="60" height="40" rx="2"/>
      <!-- Core label -->
      <text x="750" y="340" font-family="Consolas, monospace" font-size="12" fill="#2196F3" fill-opacity="0.8" stroke="none">CORES [0..23]</text>
    </g>

    <!-- NoC fabric -->
    <g stroke="#00BCD4" stroke-opacity="0.5">
      <rect x="700" y="160" width="240" height="200" rx="4" stroke-dasharray="6,4"/>
      <text x="820" y="395" font-family="Consolas, monospace" font-size="11" fill="#00BCD4" fill-opacity="0.7" stroke="none">INTERCONNECT (NoC)</text>
    </g>

    <!-- DRAM block -->
    <g stroke="#4DD0E1" stroke-opacity="0.6">
      <rect x="960" y="200" width="80" height="140" rx="3"/>
      <rect x="970" y="210" width="60" height="20" rx="1"/>
      <rect x="970" y="240" width="60" height="20" rx="1"/>
      <rect x="970" y="270" width="60" height="20" rx="1"/>
      <rect x="970" y="300" width="60" height="20" rx="1"/>
      <text x="1000" y="370" font-family="Consolas, monospace" font-size="11" fill="#4DD0E1" fill-opacity="0.7" stroke="none">DRAM (HBM2)</text>
    </g>

    <!-- Scheduler block -->
    <g stroke="#2196F3" stroke-opacity="0.5">
      <rect x="620" y="230" width="70" height="60" rx="3"/>
      <text x="627" y="255" font-family="Consolas, monospace" font-size="10" fill="#2196F3" fill-opacity="0.7" stroke="none">SCHEDULER</text>
    </g>

    <!-- Connection lines: Scheduler -> Cores -->
    <line x1="690" y1="260" x2="720" y2="210" stroke="#2196F3" stroke-opacity="0.3" stroke-width="0.8"/>
    <line x1="690" y1="260" x2="750" y2="210" stroke="#2196F3" stroke-opacity="0.3" stroke-width="0.8"/>

    <!-- Connection lines: Cores -> NoC (bidirectional arrows) -->
    <line x1="940" y1="220" x2="960" y2="220" stroke="#00BCD4" stroke-opacity="0.4" stroke-width="0.8"/>
    <line x1="940" y1="300" x2="960" y2="300" stroke="#00BCD4" stroke-opacity="0.4" stroke-width="0.8"/>
    <polygon points="956,216 960,220 956,224" fill="#00BCD4" fill-opacity="0.4" stroke="none"/>
    <polygon points="960,296 956,300 960,304" fill="#00BCD4" fill-opacity="0.4" stroke="none"/>

    <!-- Instruction flow arrow -->
    <g stroke="#00BCD4" stroke-opacity="0.5">
      <path d="M 500 340 L 620 340" stroke-dasharray="4,3"/>
      <polygon points="612,336 620,340 612,344" fill="#00BCD4" fill-opacity="0.5" stroke="none"/>
    </g>

    <!-- Model/Operation labels -->
    <g stroke="#4DD0E1" stroke-opacity="0.5">
      <rect x="340" y="310" width="80" height="28" rx="2"/>
      <text x="346" y="329" font-family="Consolas, monospace" font-size="10" fill="#4DD0E1" fill-opacity="0.7" stroke="none">MODEL</text>
      <rect x="430" y="310" width="60" height="28" rx="2"/>
      <text x="435" y="329" font-family="Consolas, monospace" font-size="10" fill="#4DD0E1" fill-opacity="0.7" stroke="none">OP</text>
      <path d="M 420 324 L 430 324"/>
      <path d="M 490 324 L 500 324"/>
    </g>

    <!-- Dimension lines (engineering blueprint style) -->
    <g stroke="#607D8B" stroke-opacity="0.4" stroke-width="0.5">
      <!-- Horizontal dimension -->
      <line x1="700" y1="160" x2="700" y2="150"/>
      <line x1="940" y1="160" x2="940" y2="150"/>
      <line x1="700" y1="148" x2="940" y2="148"/>
      <polygon points="700,148 706,146 706,150" fill="#607D8B" fill-opacity="0.4"/>
      <polygon points="940,148 934,146 934,150" fill="#607D8B" fill-opacity="0.4"/>
      <!-- Vertical dimension -->
      <line x1="940" y1="160" x2="950" y2="160"/>
      <line x1="940" y1="360" x2="950" y2="360"/>
      <line x1="948" y1="160" x2="948" y2="360"/>
      <polygon points="948,160 946,166 950,166" fill="#607D8B" fill-opacity="0.4"/>
      <polygon points="948,360 946,354 950,354" fill="#607D8B" fill-opacity="0.4"/>
    </g>

    <!-- Coordinate labels -->
    <text x="810" y="142" font-family="Consolas, monospace" font-size="8" fill="#607D8B" fill-opacity="0.5" stroke="none">240px</text>
    <text x="956" y="265" font-family="Consolas, monospace" font-size="8" fill="#607D8B" fill-opacity="0.5" stroke="none">200px</text>
  </g>

  <!-- Corner frame marks -->
  <g fill="none" stroke="#2196F3" stroke-opacity="0.5" stroke-width="1">
    <path d="M 50 80 L 50 50 L 80 50"/>
    <path d="M 1230 80 L 1230 50 L 1200 50"/>
    <path d="M 50 640 L 50 670 L 80 670"/>
    <path d="M 1230 640 L 1230 670 L 1200 670"/>
  </g>

  <!-- Title area (left side, floating over blueprint) -->
  <text x="60" y="260" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="72" font-weight="bold" fill="#ECEFF1" fill-opacity="0.95">Asim</text>

  <!-- Title accent line -->
  <rect x="60" y="280" width="120" height="3" fill="#00BCD4" fill-opacity="0.8"/>

  <text x="60" y="330" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="36" fill="#90A4AE" fill-opacity="0.9">多核 NPU 周期级仿真器</text>

  <text x="60" y="390" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="24" fill="#607D8B" fill-opacity="0.8">架构、流水线与基础算子</text>

  <!-- Bottom info -->
  <text x="60" y="640" font-family="Consolas, monospace" font-size="14" fill="#607D8B" fill-opacity="0.6">2026-07</text>
  <text x="1220" y="640" font-family="Consolas, monospace" font-size="14" fill="#607D8B" fill-opacity="0.6" text-anchor="end">P01</text>

  <!-- Bottom accent line -->
  <rect x="60" y="660" width="1160" height="0.5" fill="#263238" fill-opacity="0.5"/>
</svg>