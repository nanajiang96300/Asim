<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#0D1B2A" />

  
  <g fill="none" stroke="#1B2838" stroke-width="0.5" stroke-opacity="0.2">
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="0" y1="640" x2="1280" y2="640" />
    <line x1="640" y1="0" x2="640" y2="720" />
  </g>

  
  <text x="60" y="65" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="48" font-weight="bold" fill="#ECEFF1">Core 微架构：三条并行流水线</text>
  <rect x="60" y="81" width="80" height="2" fill="#00BCD4" fill-opacity="0.7" />

  <text x="60" y="115" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" fill="#90A4AE">每个 Core 内部通过 LD/EX/ST 指令队列将 Tile 指令分发到三条物理流水线</text>

  
  
  <g>
    <path fill="#1B2838" fill-opacity="0.7" stroke="#263238" stroke-width="1" d="M64,150 H326 A4,4 0 0 1 330,154 V206 A4,4 0 0 1 326,210 H64 A4,4 0 0 1 60,206 V154 A4,4 0 0 1 64,150 Z" />
    <text x="195" y="175" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#ECEFF1" text-anchor="middle">Tile 双缓冲 (Buffer 0/1)</text>
    <text x="195" y="198" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#90A4AE" text-anchor="middle">deque&lt;Instruction&gt; instructions</text>
  </g>

  
  <line x1="195" y1="210" x2="195" y2="235" stroke="#2196F3" stroke-width="1" stroke-opacity="0.5" />
  <polygon points="191,229 195,235 199,229" fill="#2196F3" fill-opacity="0.5" stroke="none" />

  
  
  <path fill="#1B2838" fill-opacity="0.7" stroke="#4DD0E1" stroke-width="1" stroke-opacity="0.5" d="M63,240 H237 A3,3 0 0 1 240,243 V287 A3,3 0 0 1 237,290 H63 A3,3 0 0 1 60,287 V243 A3,3 0 0 1 63,240 Z" />
  <text x="150" y="262" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#4DD0E1" text-anchor="middle">LD Queue</text>
  <text x="150" y="280" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">MOVIN → DRAM 读请求</text>

  
  <path fill="#1B2838" fill-opacity="0.7" stroke="#2196F3" stroke-width="1" stroke-opacity="0.5" d="M258,240 H432 A3,3 0 0 1 435,243 V287 A3,3 0 0 1 432,290 H258 A3,3 0 0 1 255,287 V243 A3,3 0 0 1 258,240 Z" />
  <text x="345" y="262" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#2196F3" text-anchor="middle">EX Queue</text>
  <text x="345" y="280" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">GEMM / Vector / Scalar</text>

  
  <path fill="#1B2838" fill-opacity="0.7" stroke="#00BCD4" stroke-width="1" stroke-opacity="0.5" d="M453,240 H627 A3,3 0 0 1 630,243 V287 A3,3 0 0 1 627,290 H453 A3,3 0 0 1 450,287 V243 A3,3 0 0 1 453,240 Z" />
  <text x="540" y="262" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#00BCD4" text-anchor="middle">ST Queue</text>
  <text x="540" y="280" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#90A4AE" text-anchor="middle">MOVOUT → DRAM 写请求</text>

  
  <line x1="150" y1="290" x2="150" y2="320" stroke="#4DD0E1" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,3" />
  <line x1="345" y1="290" x2="345" y2="310" stroke="#2196F3" stroke-width="1" stroke-opacity="0.6" />
  <polygon points="341,304 345,310 349,304" fill="#2196F3" fill-opacity="0.5" stroke="none" />
  <line x1="540" y1="290" x2="540" y2="320" stroke="#00BCD4" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,3" />

  
  <path fill="#1B2838" fill-opacity="0.5" stroke="#2196F3" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="4,3" d="M258,315 H612 A3,3 0 0 1 615,318 V352 A3,3 0 0 1 612,355 H258 A3,3 0 0 1 255,352 V318 A3,3 0 0 1 258,315 Z" />
  <text x="435" y="340" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#607D8B" text-anchor="middle">按 opcode 类型分发 →</text>

  
  
  <path fill="#1B2838" fill-opacity="0.7" stroke="#2196F3" stroke-width="1.2" stroke-opacity="0.6" d="M64,380 H236 A4,4 0 0 1 240,384 V506 A4,4 0 0 1 236,510 H64 A4,4 0 0 1 60,506 V384 A4,4 0 0 1 64,380 Z" />
  <path fill="#2196F3" fill-opacity="0.15" d="M64,380 H236 A4,4 0 0 1 240,384 V410 A4,4 0 0 1 236,414 H64 A4,4 0 0 1 60,410 V384 A4,4 0 0 1 64,380 Z" />
  <text x="150" y="403" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#2196F3" text-anchor="middle">Cube Pipeline</text>
  <text x="80" y="435" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#ECEFF1">脉动阵列 (Systolic)</text>
  <text x="80" y="458" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE">多发射 (深度=H)</text>
  <text x="80" y="481" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE">16×16×16 基本块</text>
  <text x="80" y="502" font-family="Consolas, monospace" font-size="12" fill="#4DD0E1">GEMM / PRELOAD</text>

  
  <path fill="#1B2838" fill-opacity="0.7" stroke="#00BCD4" stroke-width="1.2" stroke-opacity="0.6" d="M259,380 H431 A4,4 0 0 1 435,384 V506 A4,4 0 0 1 431,510 H259 A4,4 0 0 1 255,506 V384 A4,4 0 0 1 259,380 Z" />
  <path fill="#00BCD4" fill-opacity="0.15" d="M259,380 H431 A4,4 0 0 1 435,384 V410 A4,4 0 0 1 431,414 H259 A4,4 0 0 1 255,410 V384 A4,4 0 0 1 259,380 Z" />
  <text x="345" y="403" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#00BCD4" text-anchor="middle">Vector Pipeline</text>
  <text x="275" y="435" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#ECEFF1">SIMD (2048-bit)</text>
  <text x="275" y="458" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE">单发射 (阻塞)</text>
  <text x="275" y="481" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE">128 FP16 / 拍</text>
  <text x="275" y="502" font-family="Consolas, monospace" font-size="12" fill="#4DD0E1">ADD/MUL/DIV/EXP...</text>

  
  <path fill="#1B2838" fill-opacity="0.7" stroke="#4DD0E1" stroke-width="1.2" stroke-opacity="0.6" d="M454,380 H626 A4,4 0 0 1 630,384 V506 A4,4 0 0 1 626,510 H454 A4,4 0 0 1 450,506 V384 A4,4 0 0 1 454,380 Z" />
  <path fill="#4DD0E1" fill-opacity="0.15" d="M454,380 H626 A4,4 0 0 1 630,384 V410 A4,4 0 0 1 626,414 H454 A4,4 0 0 1 450,410 V384 A4,4 0 0 1 454,380 Z" />
  <text x="540" y="403" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#4DD0E1" text-anchor="middle">Scalar Pipeline</text>
  <text x="470" y="435" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#ECEFF1">逐元素 ALU</text>
  <text x="470" y="458" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE">严格单发射</text>
  <text x="470" y="481" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE">compute_size = 1</text>
  <text x="470" y="502" font-family="Consolas, monospace" font-size="12" fill="#4DD0E1">ADD/SUB/MUL/DIV/SQRT</text>

  
  <g>
    
    <text x="700" y="160" font-family="Consolas, monospace" font-size="20" font-weight="bold" fill="#00BCD4">SPAD 地址空间</text>

    
    <path fill="#1B2838" fill-opacity="0.7" stroke="#2196F3" stroke-width="1" stroke-opacity="0.5" d="M704,180 H1196 A4,4 0 0 1 1200,184 V256 A4,4 0 0 1 1196,260 H704 A4,4 0 0 1 700,256 V184 A4,4 0 0 1 704,180 Z" />
    <text x="730" y="210" font-family="Consolas, monospace" font-size="18" fill="#2196F3">SPAD_BASE = 0x10000000</text>
    <text x="730" y="238" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">通用 SPAD  256KB/核  存储输入/中间数据</text>

    
    <path fill="#1B2838" fill-opacity="0.7" stroke="#4DD0E1" stroke-width="1" stroke-opacity="0.5" d="M704,275 H1196 A4,4 0 0 1 1200,279 V351 A4,4 0 0 1 1196,355 H704 A4,4 0 0 1 700,351 V279 A4,4 0 0 1 704,275 Z" />
    <text x="730" y="305" font-family="Consolas, monospace" font-size="18" fill="#4DD0E1">ACCUM_SPAD_BASE = 0x20000000</text>
    <text x="730" y="333" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#ECEFF1">累加器 SPAD  256KB/核  GEMM 输出专用</text>

    
    <text x="700" y="400" font-family="Consolas, monospace" font-size="20" font-weight="bold" fill="#00BCD4">双缓冲机制</text>
    <path fill="#1B2838" fill-opacity="0.6" stroke="#263238" stroke-width="1" d="M704,420 H936 A4,4 0 0 1 940,424 V506 A4,4 0 0 1 936,510 H704 A4,4 0 0 1 700,506 V424 A4,4 0 0 1 704,420 Z" />
    <text x="820" y="452" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1" text-anchor="middle">Buffer 0</text>
    <text x="820" y="478" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1" text-anchor="middle">Buffer 1</text>
    <text x="820" y="502" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE" text-anchor="middle">交替使用 · 乒乓操作</text>

    <path fill="#1B2838" fill-opacity="0.6" stroke="#263238" stroke-width="1" d="M964,420 H1196 A4,4 0 0 1 1200,424 V506 A4,4 0 0 1 1196,510 H964 A4,4 0 0 1 960,506 V424 A4,4 0 0 1 964,420 Z" />
    <text x="1080" y="452" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1" text-anchor="middle">MOVIN: base_addr = 0</text>
    <text x="1080" y="478" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#ECEFF1" text-anchor="middle">MOVOUT: src_from_accum</text>
    <text x="1080" y="502" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#90A4AE" text-anchor="middle">last_inst = true</text>
  </g>

  
  <g>
    <text x="60" y="555" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#607D8B">SystolicWS::cycle() 每周期执行：</text>
    <text x="60" y="585" font-family="Consolas, monospace" font-size="16" fill="#90A4AE">1. finish_compute_pipeline()   2. finish_vector_pipeline()   3. finish_scalar_pipeline()</text>
    <text x="60" y="610" font-family="Consolas, monospace" font-size="16" fill="#90A4AE">4. handle_ld_inst_queue()       5. EX 指令发射 (按 opcode 分发到对应流水线)</text>
    <text x="60" y="635" font-family="Consolas, monospace" font-size="16" fill="#90A4AE">6. handle_st_inst_queue()       7. 统计更新 + core_cycle++</text>
  </g>

  <text x="1220" y="695" font-family="Consolas, monospace" font-size="14" fill="#607D8B" fill-opacity="0.5" text-anchor="end">P06</text>
</svg>