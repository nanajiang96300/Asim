<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect x="0" y="0" width="1280" height="720" fill="#0D1B2A" />

  
  <g fill="none" stroke="#1B2838" stroke-width="0.5" stroke-opacity="0.25">
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="0" y1="640" x2="1280" y2="640" />
  </g>

  
  <text x="60" y="70" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="48" font-weight="bold" fill="#ECEFF1">三层执行模型</text>
  <rect x="60" y="86" width="80" height="2" fill="#00BCD4" fill-opacity="0.7" />

  
  <text x="60" y="125" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" fill="#90A4AE">Model → Operation → Tile → Instruction 是仿真器最核心的设计范式</text>

  
  <g>
    
    <g>
      <path fill="#1B2838" fill-opacity="0.7" stroke="#2196F3" stroke-width="1.2" stroke-opacity="0.6" d="M64,160 H1216 A4,4 0 0 1 1220,164 V286 A4,4 0 0 1 1216,290 H64 A4,4 0 0 1 60,286 V164 A4,4 0 0 1 64,160 Z" />
      
      <path fill="#2196F3" fill-opacity="0.12" d="M64,160 H100 A4,4 0 0 1 104,164 V286 A4,4 0 0 1 100,290 H64 A4,4 0 0 1 60,286 V164 A4,4 0 0 1 64,160 Z" />
      <text x="82" y="235" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#2196F3" text-anchor="middle">L1</text>
      
      <text x="130" y="200" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="28" font-weight="bold" fill="#ECEFF1">Model（张量计算图）</text>
      <text x="130" y="235" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" fill="#90A4AE">创建 Operation 节点，通过 Tensor 边连接形成计算图</text>
      <text x="130" y="265" font-family="Consolas, monospace" font-size="18" fill="#607D8B">initialize_model() → 构建 Operation 依赖图 → initialize_tiles()</text>
    </g>

    
    <polygon points="630,296 640,310 650,296" fill="#2196F3" fill-opacity="0.6" stroke="none" />
    <line x1="640" y1="290" x2="640" y2="302" stroke="#2196F3" stroke-width="1.5" stroke-opacity="0.6" />
    <text x="660" y="306" font-family="Consolas, monospace" font-size="14" fill="#607D8B">生成 Tile</text>

    
    <g>
      <path fill="#1B2838" fill-opacity="0.7" stroke="#00BCD4" stroke-width="1.2" stroke-opacity="0.6" d="M64,315 H1216 A4,4 0 0 1 1220,319 V441 A4,4 0 0 1 1216,445 H64 A4,4 0 0 1 60,441 V319 A4,4 0 0 1 64,315 Z" />
      <path fill="#00BCD4" fill-opacity="0.12" d="M64,315 H100 A4,4 0 0 1 104,319 V441 A4,4 0 0 1 100,445 H64 A4,4 0 0 1 60,441 V319 A4,4 0 0 1 64,315 Z" />
      <text x="82" y="390" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#00BCD4" text-anchor="middle">L2</text>
      <text x="130" y="355" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="28" font-weight="bold" fill="#ECEFF1">Operation（算子实现）</text>
      <text x="130" y="390" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" fill="#90A4AE">按 batch 拆分生成 Tile，每个 Tile 调用 initialize_instructions() 生成指令序列</text>
      <text x="130" y="420" font-family="Consolas, monospace" font-size="18" fill="#607D8B">initialize_tiles() → for each batch → initialize_instructions(tile)</text>
    </g>

    
    <polygon points="630,451 640,465 650,451" fill="#00BCD4" fill-opacity="0.6" stroke="none" />
    <line x1="640" y1="445" x2="640" y2="457" stroke="#00BCD4" stroke-width="1.5" stroke-opacity="0.6" />
    <text x="660" y="461" font-family="Consolas, monospace" font-size="14" fill="#607D8B">生成指令序列</text>

    
    <g>
      <path fill="#1B2838" fill-opacity="0.7" stroke="#4DD0E1" stroke-width="1.2" stroke-opacity="0.6" d="M64,470 H1216 A4,4 0 0 1 1220,474 V596 A4,4 0 0 1 1216,600 H64 A4,4 0 0 1 60,596 V474 A4,4 0 0 1 64,470 Z" />
      <path fill="#4DD0E1" fill-opacity="0.12" d="M64,470 H100 A4,4 0 0 1 104,474 V596 A4,4 0 0 1 100,600 H64 A4,4 0 0 1 60,596 V474 A4,4 0 0 1 64,470 Z" />
      <text x="82" y="545" font-family="Consolas, monospace" font-size="22" font-weight="bold" fill="#4DD0E1" text-anchor="middle">L3</text>
      <text x="130" y="510" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="28" font-weight="bold" fill="#ECEFF1">Instruction（原子执行单元）</text>
      <text x="130" y="545" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" fill="#90A4AE">每条指令携带 opcode / src_addr / dest_addr / tile 维度 / compute_size</text>
      <text x="130" y="575" font-family="Consolas, monospace" font-size="18" fill="#607D8B">MOVIN → GEMM_PRELOAD → GEMM → ADD → SCALAR_SQRT → ... → MOVOUT</text>
    </g>
  </g>

  
  <g>
    <text x="60" y="645" font-family="Consolas, monospace" font-size="16" fill="#607D8B">Instruction { Opcode opcode; addr_type dest_addr; vector&lt;addr_type&gt; src_addrs;</text>
    <text x="60" y="665" font-family="Consolas, monospace" font-size="16" fill="#607D8B">  uint32_t compute_size; uint32_t tile_m, tile_k, tile_n; cycle_type start_cycle, finish_cycle; }</text>
  </g>

  <text x="1220" y="695" font-family="Consolas, monospace" font-size="14" fill="#607D8B" fill-opacity="0.5" text-anchor="end">P04</text>
</svg>